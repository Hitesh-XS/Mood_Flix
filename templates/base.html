{% load static %}

<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0B0F19]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodFlix</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        mono: ['"Space Grotesk"', 'monospace'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        /* Global CSS Overrides to keep the platform feeling premium */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0B0F19;
        }
        ::-webkit-scrollbar-thumb {
            background: #1F293D;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #FF3366;
        }
    </style>
</head>
<body class="h-full bg-[#0B0F19] font-sans text-slate-200 antialiased selection:bg-[#FF3366] selection:text-white flex flex-col">

    {% include 'navbar.html' %}

    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
