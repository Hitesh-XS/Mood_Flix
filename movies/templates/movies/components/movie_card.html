<div class="movie-card group relative flex flex-col h-full bg-[#131A2C]/40 backdrop-blur-md border border-white/[0.06] rounded-2xl overflow-hidden transition-all duration-300 ease-in-out hover:-translate-y-2 hover:border-[#FF3366]/30 hover:shadow-[0_12px_40px_rgba(0,0,0,0.6)]">

    <a href="{% url 'movie_detail' movie.id %}" class="flex flex-col h-full no-underline outline-none focus-visible:ring-2 focus-visible:ring-[#FF3366]/50">

        <div class="relative aspect-[2/3] w-full overflow-hidden bg-slate-900 border-b border-white/[0.04]">
            <div class="absolute inset-0 bg-gradient-to-t from-[#0B0F19]/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 z-10 flex items-end p-4">
                <span class="text-xs font-mono font-bold tracking-wider text-white bg-[#FF3366] px-2.5 py-1 rounded shadow-lg transform translate-y-2 group-hover:translate-y-0 transition-transform duration-300">
                    VIEW DETAILS
                </span>
            </div>

            <img
                src="{{ movie.poster_url }}"
                alt="{{ movie.title }}"
                class="w-full h-full object-cover transform scale-100 group-hover:scale-105 transition-transform duration-500 ease-out"
                loading="lazy"
            >
        </div>

        <div class="p-4 flex flex-col justify-between flex-grow gap-2 relative z-20">

            <h4 class="text-sm sm:text-base font-semibold text-slate-200 group-hover:text-white transition-colors duration-200 line-clamp-2 leading-snug font-['Plus_Jakarta_Sans',sans-serif]">
                {{ movie.title }}
            </h4>

            <div class="flex items-center gap-1.5 pt-1">
                <span class="text-xs text-[#00F5D4] drop-shadow-[0_0_6px_rgba(0,245,212,0.3)]">★</span>
                <span class="text-xs font-mono font-bold text-slate-300 tracking-tight">
                    {{ movie.vote_average }}
                </span>
                <span class="text-[10px] font-mono text-slate-500 font-normal">/10</span>
            </div>

        </div>

    </a>
</div>
